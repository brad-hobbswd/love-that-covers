<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stories | Love That Covers</title>

<style>

:root {
  --cream: #f6e7c1;
  --red: #e63946;
  --purple: #5a3e6b;
  --yellow: #f4c542;
  --green: #6a994e;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Georgia, serif;
  background: var(--cream);
  color: var(--purple);
}

/* HEADER */
.site-header {
  background: var(--red);
  color: white;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
}

/* MENU */
.menu-toggle {
  font-size: 28px;
  cursor: pointer;
  display: none;
}

/* NAV */
.site-nav {
  background: var(--purple);
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;
}

.site-nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

/* DROPDOWN */
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  background: var(--purple);
  top: 100%;
  left: 0;
}

.dropdown-content a {
  display: block;
  padding: 10px;
}

.dropdown:hover .dropdown-content {
  display: block;
}

/* CONTENT */
.container {
  max-width: 1000px;
  margin: 60px auto;
  padding: 0 20px;
}

h2 {
  text-align: center;
  color: var(--red);
  margin-bottom: 40px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 8px;
  text-align: center;
}

.btn {
  margin-top: 15px;
  display: inline-block;
  padding: 10px 20px;
  background: var(--green);
  color: white;
  text-decoration: none;
}

/* MOBILE */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .site-nav {
    position: fixed;
    right: -260px;
    top: 0;
    height: 100%;
    width: 260px;
    flex-direction: column;
    padding-top: 80px;
    transition: 0.3s;
  }

  .site-nav.active {
    right: 0;
  }

  .dropdown-content {
    display: block;
    position: static;
  }
}

footer {
  background: var(--purple);
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 60px;
}

</style>
</head>

<body>

<header class="site-header">
  <div>
    <h1>Love That Covers</h1>
    <p>by Bradley Hobbs</p>
  </div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>

<nav class="site-nav" id="mobileNav">

  <a href="index.html">Home</a>
  <a href="forward.html">Forward</a>
  <a href="preface.html">Preface</a>

  <div class="dropdown">
    <a href="stories.html">Stories ▾</a>
    <div class="dropdown-content">
      <a href="chapter1.html">Chapter One</a>
      <a href="chapter2.html">Chapter Two</a>
      <a href="chapter3.html">Chapter Three</a>
      <a href="chapter4.html">Chapter Four</a>
      <a href="chapter5.html">Chapter Five</a>
    </div>
  </div>

  <a href="store.html">Store</a>
  <a href="about.html">About</a>
  <a href="closing.html">Closing</a>
  <a href="prayer.html">Prayer</a>

</nav>

<div class="container">

  <h2>The Stories</h2>

  <div class="grid">

    <div class="card">
      <h3>Chapter One</h3>
      <p>The Quilt</p>
      <a href="chapter1.html" class="btn">Read</a>
    </div>

    <div class="card">
      <h3>Chapter Two</h3>
      <p>The Gift of Healing</p>
      <a href="chapter2.html" class="btn">Read</a>
    </div>

  </div>

</div>

<footer>
  <p>© 2026 Bradley Hobbs</p>
</footer>

<script>
function toggleMenu() {
  document.getElementById("mobileNav").classList.toggle("active");
}
</script>

</body>
</html>
